name: Binance QA Suite CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Java: all modules (payment-api + trading-engine-simulator) ──────────
  java-tests:
    name: Java Tests (71 total)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run all Java tests (both modules)
        run: mvn test --no-transfer-progress

      - name: Upload Allure report — payment-api
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-payment-api
          path: payment-api/target/site/allure-maven-plugin/
          retention-days: 14

      - name: Upload Allure report — trading-engine
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-trading-engine
          path: trading-engine-simulator/target/site/allure-maven-plugin/
          retention-days: 14

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: |
            payment-api/target/surefire-reports/
            trading-engine-simulator/target/surefire-reports/
          retention-days: 14

  # ── Frontend: Next.js type check + build ────────────────────────────────
  ui-build:
    name: UI Build Check (Next.js 15)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: trading-engine-ui

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: trading-engine-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8092
          NEXT_PUBLIC_WS_URL: ws://localhost:8093
